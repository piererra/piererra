name: Sync Subway Surfers Data

# Keeps editors/subway/subway-data.js up to date with the live game
# roster (characters, hoverboards, profile cosmetics) and the current
# Play Store version, by running .github/scripts/sync-subway-data.js.
#
# All source URLs live in repo secrets (Settings -> Secrets and
# variables -> Actions), not in this file or in the script itself,
# so the upstream data source stays private even though this repo
# is public.

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 GMT+7.
    # GitHub Actions cron always runs in UTC, so these are the same
    # four moments shifted back 7 hours: 17:00, 23:00, 05:00, 11:00 UTC.
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:
    # Manual "Run workflow" button in the Actions tab, for an
    # on-demand refresh right after you notice a game update.

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          SSG_CHAR_SOURCE_URL: ${{ secrets.SSG_CHAR_SOURCE_URL }}
          SSG_BOARD_SOURCE_URL: ${{ secrets.SSG_BOARD_SOURCE_URL }}
          SSG_PROFILE_SOURCE_URL: ${{ secrets.SSG_PROFILE_SOURCE_URL }}
          SSG_CHAR_LINKS_URL: ${{ secrets.SSG_CHAR_LINKS_URL }}
          SSG_BOARD_LINKS_URL: ${{ secrets.SSG_BOARD_LINKS_URL }}
          SSG_PLAYSTORE_API_URL: ${{ secrets.SSG_PLAYSTORE_API_URL }}
        run: node .github/scripts/sync-subway-data.js

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- editors/subway/subway-data.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add editors/subway/subway-data.js
          git commit -m "chore: sync subway surfers data [automated]"
          git push
